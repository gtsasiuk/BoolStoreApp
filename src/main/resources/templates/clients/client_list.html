<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{page.clients.list.title}">Clients</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
  <div class="card p-4">

    <h2 class="mb-4" th:text="#{clients.title}"></h2>

    <form method="get"
          th:action="@{/clients}"
          th:object="${filter}"
          class="card mb-4 p-3 shadow-sm">

      <div class="row g-3 align-items-end">

        <div class="col-md-4">
          <label th:text="#{clients.search}"></label>
          <input type="text"
                 th:field="*{search}"
                 class="form-control"
                 th:placeholder="#{clients.search.placeholder}">
        </div>

        <div class="col-md-3">
          <label th:text="#{clients.status}"></label>
          <select th:field="*{blocked}" class="form-select">
            <option value="" th:text="#{clients.status.all}"></option>
            <option value="true" th:text="#{clients.status.blocked}"></option>
            <option value="false" th:text="#{clients.status.active}"></option>
          </select>
        </div>

        <div class="col-md-3">
          <label th:text="#{clients.sort}"></label>
          <select th:field="*{sort}" class="form-select">
            <option value="name" th:text="#{clients.sort.name}"></option>
            <option value="email" th:text="#{clients.sort.email}"></option>
            <option value="balance" th:text="#{clients.sort.balance}"></option>
          </select>
        </div>

        <div class="col-md-2">
          <label th:text="#{clients.direction}"></label>
          <select th:field="*{dir}" class="form-select">
            <option value="asc" th:text="#{clients.direction.asc}"></option>
            <option value="desc" th:text="#{clients.direction.desc}"></option>
          </select>
        </div>

        <input type="hidden" th:field="*{page}" value="0">

        <div class="col-md-12 text-end mt-2">
          <button class="btn btn-primary"
                  th:text="#{clients.apply}">
          </button>
          <a href="/clients"
             class="btn btn-secondary ms-2"
             th:text="#{clients.reset}">
          </a>
        </div>
      </div>
    </form>

    <div th:if="${#lists.isEmpty(clients.content)}" class="alert alert-warning text-center">
      <span th:text="#{clients.empty}"></span>
    </div>

    <table class="table table-hover align-middle"
           th:if="${!#lists.isEmpty(clients.content)}">

      <thead>
      <tr>
        <th th:text="#{clients.table.name}"></th>
        <th th:text="#{clients.table.email}"></th>
        <th th:text="#{clients.table.balance}"></th>
        <th th:text="#{clients.table.status}"></th>
        <th th:text="#{clients.table.actions}"></th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="client : ${clients}">
        <td th:text="${client.name}"></td>
        <td th:text="${client.email}"></td>
        <td>$<span th:text="${client.balance}"></span></td>

        <td>
          <span th:if="${client.blocked}"
                class="badge bg-danger"
                th:text="#{clients.status.blocked}">
          </span>
          <span th:if="${!client.blocked}"
                class="badge bg-success"
                th:text="#{clients.status.active}">
          </span>
        </td>

        <td>
          <form th:action="@{/clients/toggle-block}" method="post" class="d-inline">

            <input type="hidden" th:field="*{filter.page}">
            <input type="hidden" th:field="*{filter.size}">
            <input type="hidden" th:field="*{filter.sort}">
            <input type="hidden" th:field="*{filter.dir}">
            <input type="hidden" th:field="*{filter.search}">
            <input type="hidden" th:field="*{filter.blocked}">

            <input type="hidden" name="email" th:value="${client.email}"/>

            <button type="submit"
                    class="btn btn-sm"
                    th:classappend="${client.blocked} ? 'btn-success' : 'btn-danger'">

              <span th:text="${client.blocked} ? #{clients.unblock} : #{clients.block}"></span>
            </button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>

    <nav class="mt-4" th:if="${clients.totalPages > 1}">
      <ul class="pagination justify-content-center">
        <li class="page-item" th:if="${filter.page != 0}" th:classappend="${clients.first} ? 'disabled'">
          <a class="page-link" th:href="@{/clients(page=${clients.number - 1}, size=${filter.size}, sort=${filter.sort}, dir=${filter.dir}, search=${filter.search}, blocked=${filter.blocked})}">&larr;</a>
        </li>
        <li th:each="i : ${#numbers.sequence(0, clients.totalPages - 1)}"
            class="page-item" th:classappend="${i == clients.number} ? 'active'">
          <a class="page-link" th:href="@{/clients(page=${i}, size=${filter.size}, sort=${filter.sort}, dir=${filter.dir}, search=${filter.search}, blocked=${filter.blocked})}"
             th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:if="${filter.page < clients.totalPages - 1}"  th:classappend="${clients.last} ? 'disabled'">
          <a class="page-link" th:href="@{/clients(page=${clients.number + 1}, size=${filter.size}, sort=${filter.sort}, dir=${filter.dir}, search=${filter.search}, blocked=${filter.blocked})}">&rarr;</a>
        </li>

      </ul>
    </nav>

  </div>
</div>

</body>
</html>
