<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{page.login.title}">Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
  <div class="card form-card p-4">
    <h2 class="mb-4" th:text="#{login.title}">Login</h2>

    <form method="post" th:object="${loginForm}" th:action="@{/auth/login}">
      <div class="mb-3">
        <label th:text="#{login.email}">Email</label>
        <input type="email"
               name="email"
               required
               class="form-control"
               th:placeholder="#{login.email}">
      </div>

      <div class="mb-3">
        <label th:text="#{login.password}">Password</label>
        <input type="password"
               name="password"
               required
               class="form-control"
               th:placeholder="#{login.password}">
      </div>
      <div class="form-error" th:if="${#fields.hasGlobalErrors()}">
        <ul class="mb-0">
          <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
        </ul>
      </div>
      <button type="submit"
              class="btn btn-primary"
              th:text="#{button.login}">
        Login
      </button>
    </form>

    <div class="link mt-3">
      <span th:text="#{link.noAccount}">Don’t have an account?</span>
      <a href="/auth/register" th:text="#{link.register}">Register</a>
    </div>
  </div>
</div>

</body>
</html>
