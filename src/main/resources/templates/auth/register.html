<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.register.title}">Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="card form-card p-4">
        <h2 class="mb-4" th:text="#{register.title}">Create account</h2>

        <form method="post" action="/auth/register">
            <div class="mb-3">
                <label th:text="#{register.name}">Name</label>
                <input type="text"
                       name="name"
                       required
                       class="form-control"
                       th:placeholder="#{register.name}">
            </div>

            <div class="mb-3">
                <label th:text="#{register.email}">Email</label>
                <input type="email"
                       name="email"
                       required
                       class="form-control"
                       th:placeholder="#{register.email}">
            </div>

            <div class="mb-3">
                <label th:text="#{register.password}">Password</label>
                <input type="password"
                       name="password"
                       required
                       class="form-control"
                       th:placeholder="#{register.password}">
            </div>

            <button type="submit"
                    class="btn btn-primary"
                    th:text="#{button.register}">
                Register
            </button>
        </form>

        <div class="link mt-3">
            <span th:text="#{link.haveAccount}">Already registered?</span>
            <a href="/auth/login" th:text="#{link.login}">Login</a>
        </div>
    </div>
</div>

</body>
</html>
