<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="row g-4">
        <div th:each="book : ${books}" class="col-12 col-sm-6 col-md-4 col-lg-3">
            <a th:href="@{'/books/' + ${book.name}}" class="card-link-wrapper">
                <div class="card h-100 book-card">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${book.name}"></h5>
                        <p class="card-text"><strong>Genre:</strong> <span th:text="${book.genre}"></span></p>
                        <p class="card-text"><strong>Price:</strong> $<span th:text="${book.price}"></span></p>
                        <p class="card-text text-truncate" th:text="${book.description}"></p>

                        <span class="btn btn-primary mt-auto">View details</span>

                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
