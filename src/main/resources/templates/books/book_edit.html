<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="mb-4">Edit Book</h2>

    <form th:action="@{'/books/edit/' + ${book.name}}"
          th:object="${book}"
          method="post">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" th:field="*{name}" class="form-control" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label">Author</label>
        <input type="text" th:field="*{author}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Genre</label>
        <input type="text" th:field="*{genre}" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Age Group</label>
        <select th:field="*{ageGroup}" class="form-select" required>
          <option th:each="ag : ${ageGroups}"
                  th:value="${ag}"
                  th:text="${ag}">
          </option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Language</label>
        <select th:field="*{language}" class="form-select" required>
          <option th:each="lang : ${languages}"
                  th:value="${lang}"
                  th:text="${lang}">
          </option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number"
               step="0.01"
               th:field="*{price}"
               class="form-control"
               required>
      </div>
      <div class="mb-3">
        <label class="form-label">Publication Date</label>
        <input type="date"
               th:field="*{publicationDate}"
               class="form-control"
               required>
      </div>
      <div class="mb-3">
        <label class="form-label">Pages</label>
        <input type="number"
               th:field="*{pages}"
               class="form-control"
               required>
      </div>
      <div class="mb-3">
        <label class="form-label">Characteristics</label>
        <input type="text"
               th:field="*{characteristics}"
               class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea th:field="*{description}"
                  class="form-control"
                  rows="4"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="/books" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
