<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>BookStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="mb-4" sec:authorize="hasRole('EMPLOYEE')">
        <a href="/books/add" class="btn btn-success">+ Add New Book</a>
    </div>
    <div class="row g-4">
        <div th:each="book : ${books}" class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 book-card">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${book.name}"></h5>

                    <p class="card-text">
                        <strong>Genre:</strong> <span th:text="${book.genre}"></span>
                    </p>
                    <p class="card-text">
                        <strong>Price:</strong> $<span th:text="${book.price}"></span>
                    </p>

                    <p class="card-text text-truncate" th:text="${book.description}"></p>

                    <a th:href="@{'/books/' + ${book.name}}"
                       class="btn btn-primary mt-auto mb-2">
                        View details
                    </a>

                    <div sec:authorize="hasRole('EMPLOYEE')" class="d-flex gap-2 mt-2">
                        <a th:href="@{'/books/edit/' + ${book.name}}"
                           class="btn btn-edit btn-sm w-100">
                            Edit
                        </a>

                        <form th:action="@{'/books/toggle-active/' + ${book.name}}"
                              method="post" class="w-100">
                            <button type="submit"
                                    th:class="${book.active} ? 'btn btn-deactivate btn-sm w-100' : 'btn btn-activate btn-sm w-100'">
                                <span th:text="${book.active} ? 'Deactivate' : 'Activate'"></span>
                            </button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
