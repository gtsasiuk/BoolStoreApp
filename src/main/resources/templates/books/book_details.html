<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.book.details.title}">Book Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="book-detail-card">
    <h2 th:text="${book.name}">Book Title</h2>
    <p><strong th:text="#{book.label.author} + ':'">Author:</strong> <span th:text="${book.author}">Author Name</span></p>
    <p><strong th:text="#{book.label.genre} + ':'">Genre:</strong> <span th:text="${book.genre}">Genre</span></p>
    <p><strong th:text="#{book.label.ageGroup} + ':'">Age Group:</strong> <span th:text="${book.ageGroup}">Age Group</span></p>
    <p><strong th:text="#{book.label.language} + ':'">Language:</strong> <span th:text="${book.language}">Language</span></p>
    <p><strong th:text="#{book.label.pages} + ':'">Pages:</strong> <span th:text="${book.pages}">0</span></p>
    <p><strong th:text="#{book.label.price} + ':'">Price:</strong> $<span th:text="${book.price}">0.00</span></p>
    <p class="book-description">
        <strong th:text="#{book.label.description} + ':'">Description:</strong> <span th:text="${book.description}">Full book description goes here...</span>
    </p>
    <p class="book-description">
        <strong th:text="#{book.label.characteristics} + ':'">Characteristics:</strong> <span th:text="${book.characteristics}">Additional characteristics...</span>
    </p>

    <div class="mt-4 d-flex gap-2">
        <a href="/books" class="btn btn-secondary" th:text="#{book.back}">← Back</a>
        <div sec:authorize="hasRole('EMPLOYEE')" class="d-flex gap-2">
            <a th:href="@{'/books/edit/' + ${book.name}}"
               class="btn btn-edit"
               th:text="#{books.edit}">Edit</a>
            <form th:action="@{'/books/toggle-active/' + ${book.name}}" method="post">
                <button type="submit"
                        th:classappend="${book.active} ? 'btn btn-deactivate' : 'btn btn-activate'">
                    <span th:text="${book.active} ? #{books.deactivate} : #{books.activate}">Activate/Deactivate</span>
                </button>
            </form>
        </div>
        <div sec:authorize="hasRole('CUSTOMER')" class="d-flex gap-2">
            <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="bookName" th:value="${book.name}">
                <button type="submit" class="btn btn-primary" th:text="#{book.addToCart}">Add to Cart</button>
            </form>
        </div>
        <div sec:authorize="!isAuthenticated()" class="d-flex gap-2">
            <a href="/auth/login" class="btn btn-primary" th:text="#{book.addToCart}">Add to Cart</a>
        </div>
    </div>

</div>

</body>
</html>
