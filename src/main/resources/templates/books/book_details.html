<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
  <title th:text="${book.name} + ' - BookStore'">Book Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="book-detail-card">
    <h2 th:text="${book.name}">Book Title</h2>
    <p><strong>Author:</strong> <span th:text="${book.author}">Author Name</span></p>
    <p><strong>Genre:</strong> <span th:text="${book.genre}">Genre</span></p>
    <p><strong>Age Group:</strong> <span th:text="${book.ageGroup}">Age Group</span></p>
    <p><strong>Language:</strong> <span th:text="${book.language}">Language</span></p>
    <p><strong>Pages:</strong> <span th:text="${book.pages}">0</span></p>
    <p><strong>Price:</strong> $<span th:text="${book.price}">0.00</span></p>
    <p><strong>Publication Date:</strong> <span th:text="${book.publicationDate}">2026-01-29</span></p>
    <p class="book-description"><strong>Description:</strong> <span th:text="${book.description}">Full book description goes here...</span></p>
    <p class="book-description"><strong>Characteristics:</strong> <span th:text="${book.characteristics}">Additional characteristics...</span></p>

    <div class="mt-4 d-flex gap-2">
        <a href="/books" class="btn btn-secondary">← Back</a>

        <div sec:authorize="hasRole('EMPLOYEE')" class="d-flex gap-2">
            <a th:href="@{'/books/edit/' + ${book.name}}" class="btn btn-edit">Edit</a>
            <form th:action="@{'/books/toggle-active/' + ${book.name}}" method="post">
                <button type="submit"
                        th:class="${book.active} ? 'btn btn-deactivate' : 'btn btn-activate'">
                    <span th:text="${book.active} ? 'Deactivate' : 'Activate'"></span>
                </button>
            </form>
        </div>


        <div sec:authorize="hasRole('CUSTOMER')" class="d-flex gap-2">
            <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="bookName" th:value="${book.name}">
                <button type="submit" class="btn btn-primary">
                    Add to Cart
                </button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()" class="d-flex gap-2">
            <a href="/auth/login" type="submit" class="btn btn-primary">Add to Cart</a>
        </div>
    </div>

</div>

</body>
</html>
