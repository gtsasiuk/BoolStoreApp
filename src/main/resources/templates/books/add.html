<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add New Book - BookStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="book-detail-card">
  <h2>Add New Book</h2>

  <form th:action="@{/books/add}" th:object="${book}" method="post">
    <div class="mb-3">
      <label>Book Name</label>
      <input type="text" th:field="*{name}" placeholder="Enter book name" required>
    </div>

    <div class="mb-3">
      <label>Author</label>
      <input type="text" th:field="*{author}" placeholder="Enter author name" required>
    </div>

    <div class="mb-3">
      <label>Genre</label>
      <input type="text" th:field="*{genre}" placeholder="Enter genre">
    </div>

    <div class="mb-3">
      <label>Age Group</label>
      <input type="text" th:field="*{ageGroup}" placeholder="Enter age group">
    </div>

    <div class="mb-3">
      <label>Language</label>
      <input type="text" th:field="*{language}" placeholder="Enter language">
    </div>

    <div class="mb-3">
      <label>Pages</label>
      <input type="number" th:field="*{pages}" placeholder="Number of pages">
    </div>

    <div class="mb-3">
      <label>Price</label>
      <input type="number" step="0.01" th:field="*{price}" placeholder="Price in USD" required>
    </div>

    <div class="mb-3">
      <label>Publication Date</label>
      <input type="date" th:field="*{publicationDate}">
    </div>

    <div class="mb-3">
      <label>Description</label>
      <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Book description"></textarea>
    </div>

    <div class="mb-3">
      <label>Characteristics</label>
      <textarea th:field="*{characteristics}" class="form-control" rows="2" placeholder="Additional characteristics"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Add Book</button>
      <a href="/books" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

</body>
</html>
