<header th:fragment="header"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <div class="container header-container d-flex justify-content-between align-items-center">
        <h2 th:text="#{app.name}">📚 BookStore</h2>

        <nav class="nav d-flex align-items-center gap-3">
            <span class="d-flex gap-3">
                <a href="/" th:text="#{nav.home}">Home</a>
                <a href="/books" th:text="#{nav.books}">Books</a>
            </span>

            <span sec:authorize="hasRole('CUSTOMER')" class="d-flex gap-3">
                <a href="/cart" th:text="#{nav.cart}">My cart</a>
                <a href="/orders/my" th:text="#{nav.orders}">My orders</a>
            </span>

            <span sec:authorize="hasRole('EMPLOYEE')" class="d-flex gap-3">
                <a href="/orders" th:text="#{nav.allOrders}">Orders</a>
                <a href="/clients" th:text="#{nav.clients}">Clients</a>
                <a href="/employees" th:text="#{nav.employees}">Employees</a>
            </span>

            <span sec:authorize="isAuthenticated()" class="d-flex gap-3 align-items-center">
                <a href="/profile" th:text="#{nav.profile}">Profile</a>
                <a href="#" th:text="#{nav.logout}" onclick="document.getElementById('logoutForm').submit(); return false;">Logout</a>
                <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;"></form>
            </span>

            <span sec:authorize="!isAuthenticated()" class="d-flex gap-3">
                <a href="/auth/login" th:text="#{nav.login}">Login</a>
                <a href="/auth/register" th:text="#{nav.register}">Register</a>
            </span>

            <div class="lang-switch">
                <button type="button" class="lang-btn">
                    🌐 <span class="lang-code"
                            th:text="${#locale.language.toUpperCase()}">EN</span>
                </button>
                <div class="lang-dropdown">
                    <a th:href="@{${currentUri}(lang='en')}"
                       th:classappend="${#locale.language == 'en'} ? 'fw-bold text-primary'">
                        EN
                    </a>
                    <a th:href="@{${currentUri}(lang='ua')}"
                       th:classappend="${#locale.language == 'ua'} ? 'fw-bold text-primary'">
                        UA
                    </a>
                </div>
            </div>
        </nav>
    </div>
</header>
