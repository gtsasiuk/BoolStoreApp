<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add New Book - BookStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="book-detail-card">
  <h2>Create New Employee</h2>

  <form th:action="@{/employees/new}" th:object="${employee}" method="post">
    <div class="mb-3">
      <label>Name</label>
      <input type="text" th:field="*{name}" placeholder="Enter employee name" required>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" placeholder="Enter employee email" required>
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" th:field="*{password}" placeholder="Enter employee password">
    </div>

    <div class="mb-3">
      <label>Phone</label>
      <input type="text" th:field="*{phone}" placeholder="Enter employee phone">
    </div>

    <div class="mb-3">
      <label>Birth Date</label>
      <input type="date" th:field="*{birthDate}" placeholder="Enter employee birth date">
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Create</button>
      <a href="/employees" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

</body>
</html>
