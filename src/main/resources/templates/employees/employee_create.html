<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{page.employees.create.title}">Create Employee</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="book-detail-card">
  <h2 th:text="#{employees.create.title}"></h2>

  <form th:action="@{/employees/new}" th:object="${employee}" method="post">

    <div class="mb-3">
      <label th:text="#{employees.form.name}"></label>
      <input type="text"
             th:field="*{name}"
             class="form-control"
             th:placeholder="#{employees.placeholder.name}"
             required>
    </div>

    <div class="mb-3">
      <label th:text="#{employees.form.email}"></label>
      <input type="email"
             th:field="*{email}"
             class="form-control"
             th:placeholder="#{employees.placeholder.email}"
             required>
    </div>

    <div class="mb-3">
      <label th:text="#{employees.form.password}"></label>
      <input type="password"
             th:field="*{password}"
             class="form-control"
             th:placeholder="#{employees.placeholder.password}">
    </div>

    <div class="mb-3">
      <label th:text="#{employees.form.phone}"></label>
      <input type="text"
             th:field="*{phone}"
             class="form-control"
             th:placeholder="#{employees.placeholder.phone}">
    </div>

    <div class="mb-3">
      <label th:text="#{employees.form.birthDate}"></label>
      <input type="date"
             th:field="*{birthDate}"
             class="form-control">
    </div>

    <div class="d-flex gap-2">
      <button type="submit"
              class="btn btn-primary"
              th:text="#{employees.create.submit}">
      </button>

      <a href="/employees"
         class="btn btn-secondary"
         th:text="#{employees.create.cancel}">
      </a>
    </div>

  </form>
</div>

</body>
</html>
