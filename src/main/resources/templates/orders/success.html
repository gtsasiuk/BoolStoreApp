<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.order.success.title}">Order success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5 text-center">
    <div class="card p-5 shadow-sm">

        <h2 class="mb-3" th:text="#{order.success.title}">
            ✅ Order successfully placed!
        </h2>

        <p class="mb-4" th:text="#{order.success.message}">
            Thank you for your purchase. Our employee will confirm your order shortly.
        </p>

        <div class="d-flex justify-content-center gap-3">
            <a href="/books"
               class="btn btn-primary"
               th:text="#{order.success.continueShopping}">
                Continue shopping
            </a>

            <a href="/orders/my"
               class="btn btn-outline-secondary"
               th:text="#{order.success.viewOrders}">
                View my orders
            </a>
        </div>

    </div>
</div>

</body>
</html>
