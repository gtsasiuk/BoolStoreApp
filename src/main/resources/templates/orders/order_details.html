<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h2>Order #<span th:text="${order.id}"></span></h2>

    <div class="card p-3 mb-4">
        <p><strong>Date:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></span></p>
        <p><strong>Status:</strong>
            <span class="badge bg-warning" th:if="${order.status.name() == 'NEW'}">NEW</span>
            <span class="badge bg-success" th:if="${order.status.name() == 'CONFIRMED'}">CONFIRMED</span>
        </p>
        <p><strong>Client:</strong> <span th:text="${order.clientEmail}"></span></p>
        <p th:if="${order.employeeEmail != null}"><strong>Employee:</strong> <span th:text="${order.employeeEmail}"></span></p>
        <p><strong>Total:</strong> $<span th:text="${order.price}"></span></p>
    </div>

    <h4>Books</h4>
    <table class="table table-hover">
        <thead>
        <tr>
            <th>Book</th>
            <th>Quantity</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${order.bookItems}">
            <td th:text="${item.bookName}"></td>
            <td th:text="${item.quantity}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/orders" class="btn btn-secondary">← Back</a>
</div>
</body>
</html>
