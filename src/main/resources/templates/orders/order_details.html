<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.order.details.title}">Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">

    <h2>
        <span th:text="#{order.details.title}"></span>
        <span th:text="${order.id}"></span>
    </h2>

    <div class="card p-3 mb-4">
        <p>
            <strong th:text="#{order.details.date}"></strong>:
            <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></span>
        </p>

        <p>
            <strong th:text="#{order.details.status}"></strong>:
            <span class="badge bg-warning"
                  th:if="${order.status.name() == 'NEW'}"
                  th:text="#{order.status.new}">
            </span>
            <span class="badge bg-success"
                  th:if="${order.status.name() == 'CONFIRMED'}"
                  th:text="#{order.status.confirmed}">
            </span>
        </p>

        <p>
            <strong th:text="#{order.details.client}"></strong>:
            <span th:text="${order.clientEmail}"></span>
        </p>

        <p th:if="${order.employeeEmail != null}">
            <strong th:text="#{order.details.employee}"></strong>:
            <span th:text="${order.employeeEmail}"></span>
        </p>

        <p>
            <strong th:text="#{order.details.total}"></strong>:
            $<span th:text="${order.price}"></span>
        </p>
    </div>

    <h4 th:text="#{order.details.books}"></h4>

    <table class="table table-hover">
        <thead>
        <tr>
            <th th:text="#{order.details.book}"></th>
            <th th:text="#{order.details.quantity}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${order.bookItems}">
            <td th:text="${item.bookName}"></td>
            <td th:text="${item.quantity}"></td>
        </tr>
        </tbody>
    </table>

    <a sec:authorize="hasRole('CUSTOMER')" href="/orders/my"
       class="btn btn-secondary"
       th:text="#{order.details.back}">
    </a>

    <a sec:authorize="hasRole('EMPLOYEE')" href="/orders"
       class="btn btn-secondary"
       th:text="#{order.details.back}">
    </a>
</div>
</body>
</html>
