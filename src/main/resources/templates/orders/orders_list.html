<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{page.orders.list.title}">Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
  <h2 th:text="#{orders.management.title}">Orders Management 🧾</h2>

  <!-- Filters -->
  <form method="get"
        th:action="@{/orders}"
        th:object="${filter}"
        class="card p-3 mb-4">

    <div class="row g-3 align-items-end">

      <div class="col-md-4">
        <label th:text="#{orders.search.label}">Search</label>
        <input class="form-control"
               th:field="*{search}"
               th:placeholder="#{orders.search.placeholder}">
      </div>

      <div class="col-md-3">
        <label th:text="#{orders.status.label}">Status</label>
        <select class="form-select" th:field="*{status}">
          <option value="" th:text="#{orders.status.all}">All</option>
          <option value="NEW" th:text="#{orders.status.new}">New</option>
          <option value="CONFIRMED" th:text="#{orders.status.confirmed}">Confirmed</option>
          <option value="CANCELLED" th:text="#{orders.status.cancelled}">Cancelled</option>
        </select>
      </div>

      <div class="col-md-3">
        <label th:text="#{orders.sort.label}">Sort by</label>
        <select class="form-select" th:field="*{sort}">
          <option value="orderDate" th:text="#{orders.sort.date}">Date</option>
          <option value="price" th:text="#{orders.sort.price}">Price</option>
          <option value="orderStatus" th:text="#{orders.sort.status}">Status</option>
        </select>
      </div>

      <div class="col-md-2">
        <label th:text="#{orders.dir.label}">Dir</label>
        <select class="form-select" th:field="*{dir}">
          <option value="desc" th:text="#{sort.descending}">↓ Desc</option>
          <option value="asc" th:text="#{sort.ascending}">↑ Asc</option>
        </select>
      </div>

      <input type="hidden" th:field="*{page}" value="0"/>

      <div class="col-12 text-end">
        <button class="btn btn-primary" th:text="#{books.apply}">Apply</button>
        <a href="/orders"
           class="btn btn-secondary ms-2"
           th:text="#{books.reset}">Reset</a>
      </div>
    </div>
  </form>

  <!-- Empty -->
  <div th:if="${#lists.isEmpty(orders.content)}">
    <div class="alert alert-warning text-center"
         th:text="#{orders.empty}">
      No orders found.
    </div>
  </div>

  <!-- Table -->
  <table class="table table-hover align-middle"
         th:if="${!#lists.isEmpty(orders.content)}">

    <thead>
    <tr>
      <th>ID</th>
      <th th:text="#{orders.client}">Client</th>
      <th th:text="#{orders.employee}">Employee</th>
      <th th:text="#{orders.date}">Date</th>
      <th th:text="#{orders.status.label}">Status</th>
      <th th:text="#{orders.total}">Total</th>
      <th th:text="#{orders.actions}">Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="order : ${orders}">
      <td th:text="${order.id}"></td>
      <td th:text="${order.clientEmail}"></td>

      <td>
                <span th:if="${order.employeeEmail != null}"
                      th:text="${order.employeeEmail}"></span>
        <span th:if="${order.employeeEmail == null}"
              class="text-muted">—</span>
      </td>

      <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></td>

      <td>
                <span class="badge bg-warning"
                      th:if="${order.status.name() == 'NEW'}"
                      th:text="#{orders.status.new}">NEW</span>

        <span class="badge bg-success"
              th:if="${order.status.name() == 'CONFIRMED'}"
              th:text="#{orders.status.confirmed}">CONFIRMED</span>

        <span class="badge bg-danger"
              th:if="${order.status.name() == 'CANCELLED'}"
              th:text="#{orders.status.cancelled}">CANCELLED</span>
      </td>

      <td>$<span th:text="${order.price}"></span></td>

      <td class="d-flex gap-2">
        <a th:href="@{/orders/{id}(id=${order.id})}"
           class="btn btn-outline-primary btn-sm flex-grow-1"
           th:text="#{orders.view}">
          View
        </a>

        <form th:if="${order.status.name() == 'NEW'}"
              th:action="@{/orders/confirm/{id}(id=${order.id})}"
              method="post"
              class="flex-grow-1">

          <!-- збереження фільтрів -->
          <input type="hidden" th:field="*{filter.page}">
          <input type="hidden" th:field="*{filter.size}">
          <input type="hidden" th:field="*{filter.sort}">
          <input type="hidden" th:field="*{filter.dir}">
          <input type="hidden" th:field="*{filter.search}">
          <input type="hidden" th:field="*{filter.status}">

          <button class="btn btn-success btn-sm w-100"
                  th:text="#{orders.confirm}">
            Confirm
          </button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <!-- Pagination -->
  <nav class="mt-4" th:if="${orders.totalPages > 1}">
    <ul class="pagination justify-content-center">

      <li class="page-item" th:if="${filter.page != 0}">
        <a class="page-link"
           th:href="@{/orders(page=${orders.number - 1}, size=${filter.size}, sort=${filter.sort}, dir=${filter.dir}, search=${filter.search}, status=${filter.status})}">
          &larr;
        </a>
      </li>

      <li th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
          class="page-item"
          th:classappend="${i == orders.number} ? 'active'">
        <a class="page-link"
           th:text="${i + 1}"
           th:href="@{/orders(page=${i}, size=${filter.size}, sort=${filter.sort}, dir=${filter.dir}, search=${filter.search}, status=${filter.status})}">
        </a>
      </li>

      <li class="page-item" th:if="${filter.page < orders.totalPages - 1}">
        <a class="page-link"
           th:href="@{/orders(page=${orders.number + 1}, size=${filter.size}, sort=${filter.sort}, dir=${filter.dir}, search=${filter.search}, status=${filter.status})}">
          &rarr;
        </a>
      </li>

    </ul>
  </nav>
</div>

</body>
</html>
