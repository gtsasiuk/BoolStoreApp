<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.errors.server.title}">Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="card book-detail-card text-center">
        <h1 th:text="#{${errorTitle}}">Error</h1>
        <p th:text="#{${errorMessage}}">Something went wrong</p>

        <a th:href="@{/}" class="btn btn-primary mt-4">
            ← <span th:text="#{error.back.home}">Back to home</span>
        </a>
    </div>
</div>
</body>
</html>
