<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.cart.title}">Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h2 th:text="#{cart.title}">Your Cart 🛒</h2>

    <div th:if="${cart.items.empty}" class="text-center my-4">
        <p th:text="#{cart.empty}">Your cart is empty</p>
        <a href="/books" class="btn btn-primary" th:text="#{button.browse}">Browse books</a>
    </div>

    <div th:if="${!cart.items.empty}">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th th:text="#{cart.book}">Book</th>
                <th th:text="#{cart.quantity}">Quantity</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.bookName}">Book Name</td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-flex gap-2 align-items-center">
                        <input type="hidden" name="bookName" th:value="${item.bookName}">
                        <input type="number" name="quantity" th:value="${item.quantity}" min="0" class="form-control form-control-sm" style="width: 80px;">
                        <button class="btn btn-outline-primary btn-sm" th:text="#{cart.update}">Update</button>
                    </form>
                </td>
                <td>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="bookName" th:value="${item.bookName}">
                        <button class="btn btn-danger btn-sm" th:text="#{cart.remove}">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="mt-3">
            <form th:action="@{/cart/checkout}" method="post" sec:authorize="isAuthenticated()">
                <button class="btn btn-success" th:text="#{cart.checkout}">Checkout</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
