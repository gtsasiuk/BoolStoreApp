<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <h2>Your Cart 🛒</h2>

    <div th:if="${cart.items.empty}" class="text-center my-4">
        <p>Your cart is empty</p>
        <a href="/books" class="btn btn-primary">Browse books</a>
    </div>

    <div th:if="${!cart.items.empty}">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>Book</th>
                <th>Quantity</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.bookName}"></td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-flex gap-2 align-items-center">
                        <input type="hidden" name="bookName" th:value="${item.bookName}">
                        <input type="number" name="quantity" th:value="${item.quantity}" min="0" class="form-control form-control-sm" style="width: 80px;">
                        <button class="btn btn-outline-primary btn-sm">Update</button>
                    </form>
                </td>
                <td>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="bookName" th:value="${item.bookName}">
                        <button class="btn btn-danger btn-sm">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="mt-3">
            <form th:action="@{/cart/checkout}" method="post" sec:authorize="isAuthenticated()">
                <button class="btn btn-success">Checkout</button>
            </form>
            <p sec:authorize="!isAuthenticated()">
                <a href="/auth/login" class="link-primary">Login</a> to checkout
            </p>
        </div>
    </div>
</div>
</body>
</html>
