<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{page.profile.title}">Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="card form-card p-4">
        <h2 class="mb-4" th:text="#{profile.title}">My Profile</h2>

        <div th:if="${!edit}">
            <p><strong th:text="#{profile.name} + ':'">Name:</strong> <span th:text="${user.name}"></span></p>
            <p><strong th:text="#{profile.email} + ':'">Email:</strong> <span th:text="${user.email}"></span></p>

            <div th:if="${user.balance != null}">
                <p><strong th:text="#{profile.balance} + ':'">Balance:</strong> $<span th:text="${user.balance}"></span></p>
            </div>

            <div th:if="${user.phone != null}">
                <p><strong th:text="#{profile.phone} + ':'">Phone:</strong> <span th:text="${user.phone}"></span></p>
                <p><strong th:text="#{profile.birthDate} + ':'">Birth Date:</strong> <span th:text="${user.birthDate}"></span></p>
            </div>

            <div class="mb-3">
                <strong th:text="#{profile.status} + ':'">Status:</strong>
                <span th:if="${user.blocked}" class="badge bg-danger" th:text="#{profile.blocked}">Blocked</span>
                <span th:if="${!user.blocked}" class="badge bg-success" th:text="#{profile.active}">Active</span>
            </div>

            <form th:action="@{/profile}" method="get">
                <button type="submit" class="btn btn-primary" name="edit" value="true"
                        th:text="#{profile.edit}">Edit Profile</button>
            </form>
        </div>

        <div th:if="${edit}">
            <form th:if="${employeeForm != null}"
                  th:action="@{/profile}"
                  th:object="${employeeForm}"
                  method="post">

                <div class="mb-3">
                    <label th:text="#{profile.name} + ':'">Name</label>
                    <input type="text" th:field="*{name}" class="form-control"/>
                    <div class="field-error" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label th:text="#{profile.phone} + ':'">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control"/>
                    <div class="field-error" th:errors="*{phone}"></div>
                </div>

                <div class="mb-3">
                    <label th:text="#{profile.birthDate} + ':'">Birth Date</label>
                    <input type="date" th:field="*{birthDate}" class="form-control"/>
                    <div class="field-error" th:errors="*{birthDate}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100"
                        th:text="#{profile.save}">Save</button>
            </form>

            <form th:if="${clientForm != null}"
                  th:action="@{/profile}"
                  th:object="${clientForm}"
                  method="post">

                <div class="mb-3">
                    <label th:text="#{profile.name} + ':'">Name</label>
                    <input type="text" th:field="*{name}" class="form-control"/>
                    <div class="field-error" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label th:text="#{profile.balance} + ':'">Balance</label>
                    <input type="number" step="0.01"
                           th:field="*{balance}" class="form-control"/>
                    <div class="field-error" th:errors="*{balance}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100"
                        th:text="#{profile.save}">Save</button>
            </form>
            <form th:if="${clientForm != null}"
                  th:action="@{/profile/delete}"
                  method="post"
                  class="mt-3"
                  th:onsubmit="return confirm([[#{profile.confirmDelete}]])">

                <button class="btn btn-danger w-100"
                        th:text="#{profile.delete}">
                    Delete Account
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
