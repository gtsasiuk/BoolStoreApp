<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container my-5">
    <div class="card form-card p-4">
        <h2 class="mb-4">My Profile</h2>

        <div th:if="${!edit}">
            <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>

            <div th:if="${user.balance != null}">
                <p><strong>Balance:</strong> $<span th:text="${user.balance}"></span></p>
            </div>

            <div th:if="${user.phone != null}">
                <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
                <p><strong>Birth Date:</strong> <span th:text="${user.birthDate}"></span></p>
            </div>

            <form th:action="@{/profile}" method="get">
                <button type="submit" class="btn btn-primary" name="edit" value="true">Edit Profile</button>
            </form>
        </div>

        <div th:if="${edit}">
            <form th:action="@{/profile}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label>Name:</label>
                    <input type="text" th:field="*{name}" class="form-control" />
                </div>

                <div class="mb-3" th:if="${user.balance != null}">
                    <label>Balance:</label>
                    <input type="number" th:field="*{balance}" step="0.01" class="form-control" />
                </div>

                <div class="mb-3" th:if="${user.phone != null}">
                    <label>Phone:</label>
                    <input type="text" th:field="*{phone}" class="form-control" />
                </div>

                <div class="mb-3" th:if="${user.birthDate != null}">
                    <label>Birth Date:</label>
                    <input type="date" th:field="*{birthDate}" class="form-control" />
                </div>
